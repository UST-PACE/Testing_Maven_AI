name: Prompts-ai

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  actions: write   # required to cancel the workflow via API

jobs:
  # =========================================================
  # BUILD JOB
  # =========================================================
  build:
    runs-on: ubuntu-latest
    container:
      image: maven:3.9.6-eclipse-temurin-17-alpine
    steps:
      - uses: actions/checkout@v4

      - name: Build Maven Project (capture logs)
        id: mvn_build
        continue-on-error: true
        run: |
          set -o pipefail
          mvn -B clean package -DskipTests 2>&1 | tee maven.log
          echo $? > .mvn_exit_code

      - name: Upload Maven build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-build-log
          path: maven.log
          retention-days: 14

      - name: Fail if Maven build failed
        run: |
          if [ "$(cat .mvn_exit_code)" -ne 0 ]; then
            echo "❌ Maven build failed"
            exit 1
          fi
          echo "✅ Maven build succeeded"

  # =========================================================
  # DOCKER BUILD
  # =========================================================
  docker-build:
    needs: build
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image (capture logs)
        continue-on-error: true
        run: |
          set -o pipefail
          docker build -t demo-app:${{ github.run_number }} \
                       -t demo-app:latest \
                       . 2>&1 | tee dockerbuild.log
          echo $? > .docker_exit_code

      - name: Upload Docker build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-build-log
          path: dockerbuild.log
          retention-days: 14

      - name: Fail if Docker build failed
        run: |
          if [ "$(cat .docker_exit_code)" -ne 0 ]; then
            echo "❌ Docker build failed"
            exit 1
          fi
          echo "✅ Docker build succeeded"

  # =========================================================
  # FAILURE ANALYSIS (COPILOT)
  # =========================================================
  analyze-failure-with-copilot:
    needs: [build, docker-build]
    if: failure()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: logs
      - run: |
          cat logs/*/*.log > ci-logs.txt || echo "No logs" > ci-logs.txt
      - name: Analyze with Copilot
        run: |
          copilot < ci-logs.txt > copilot-analysis.md || true
      - uses: actions/upload-artifact@v4
        with:
          name: copilot-analysis
          path: copilot-analysis.md

  # =========================================================
  # NOTIFY APPROVER
  # =========================================================
  notify-for-approval:
    needs: docker-build
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Send Approval Request Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER_ADDRESS }}
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: Sai.Karthik@ust.com
          from: GitHub Actions <no-reply@edge-ops.io>
          subject: "Approval Required: Production Deployment"
          body: |
            Deployment is waiting for approval.
            Run URL:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # =========================================================
  # PRODUCTION DEPLOYMENT (ENV GATE HERE)
  # =========================================================
  deploy-to-production:
    needs: notify-for-approval
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Production
        run: |
          echo "🚀 Deploying to Production"
          echo "✅ Deployment completed"

  # =========================================================
  # CANCEL WORKFLOW IF APPROVAL TIMED OUT
  # =========================================================
  cancel-workflow-on-timeout:
    name: Cancel workflow if approval timed out
    needs: deploy-to-production
    if: always() && needs.deploy-to-production.result == 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - name: Cancel Workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "⏰ Approval timed out. Cancelling workflow..."
          gh api \
            -X POST \
            repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/cancel

  # =========================================================
  # EMAIL NOTIFICATION (FINAL STATUS)
  # =========================================================
  email-notification:
    needs:
      - build
      - docker-build
      - analyze-failure-with-copilot
      - deploy-to-production
      - cancel-workflow-on-timeout
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Final Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER_ADDRESS }}
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: Sai.Karthik@ust.com
          from: GitHub Actions <no-reply@edge-ops.io>
          subject: "Workflow Result: ${{ github.workflow }}"
          body: |
            Workflow: ${{ github.workflow }}
            Status: ${{ github.run_attempt }}
            Run URL:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
