name: Prompts-aion

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  actions: write   # Needed for artifact management and gh run cancel

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: maven:3.9.6-eclipse-temurin-17-alpine
    steps:
      - uses: actions/checkout@v4
      - name: Build Maven Project (capture logs)
        id: mvn_build
        continue-on-error: true
        run: |
          set -o pipefail
          mvn -B clean compile package -DskipTests 2>&1 | tee maven.log
          EXIT_CODE=$?
          echo "$EXIT_CODE" > .mvn_exit_code
      - name: Upload Maven build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-build-log
          path: maven.log
          retention-days: 14
      - name: Fail if Maven build failed
        run: |
          EXIT_CODE=$(cat .mvn_exit_code)
          if [ "$EXIT_CODE" -ne 0 ]; then
            exit 1
          fi

  docker-build:
    needs: build
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image (capture logs)
        id: docker_build
        continue-on-error: true
        run: |
          set -o pipefail
          docker build -t demo-app:${{ github.run_number }} -t demo-app:latest . 2>&1 | tee dockerbuild.log
          EXIT_CODE=$?
          echo "$EXIT_CODE" > .docker_exit_code
      - name: Upload Docker build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-build-log
          path: dockerbuild.log
          retention-days: 14
      - name: Fail if Docker build failed
        run: |
          EXIT_CODE=$(cat .docker_exit_code)
          if [ "$EXIT_CODE" -ne 0 ]; then
            exit 1
          fi

  analyze-failure-with-copilot:
    needs: build
    if: failure()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Download logs and Install Copilot
        run: |
          # Simplified for brevity, keep your original install logic here
          echo "Installing Copilot CLI..."
      - name: Analyze failure
        run: |
          # Your original analysis logic
          echo "Analyzing logs..."

  notify-for-approval:
    needs: build
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Send Approval Request Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER_ADDRESS }}
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: Sai.Karthik@ust.com
          subject: "⏰ URGENT: Approve Deployment in 3 Minutes"
          body: |
            ⚠️ MANUAL APPROVAL REQUIRED ⚠️
            You have 3 MINUTES to approve the deployment here:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # NEW JOB: The 3-minute Bouncer
  timeout-guard:
    needs: notify-for-approval
    runs-on: ubuntu-latest
    steps:
      - name: Wait for 3 minutes
        run: sleep 180
      - name: Auto-cancel if not approved
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Check if the deployment job is still waiting
          # If the workflow is not 'completed', we force cancel it
          STATUS=$(gh run view ${{ github.run_id }} --json status -q .status)
          if [[ "$STATUS" != "completed" ]]; then
            echo "🛑 Time is up! Cancelling the workflow..."
            gh run cancel ${{ github.run_id }}
          fi

  deploy-to-production:
    needs: notify-for-approval
    runs-on: ubuntu-latest
    environment: 
      name: Production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Production
        run: |
          echo "🚀 Deployment approved and starting..."
          # Your deployment commands here
      - name: Health Check
        run: echo "✅ Health check passed"

  deployment-failed-notification:
    # Now waits for the guard and the deploy job
    needs: [build, timeout-guard]
    if: failure() || cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Determine Failure Reason
        id: failure_reason
        run: |
          DEPLOY_STATUS="${{ needs.deploy-to-production.result }}"
          if [[ "$DEPLOY_STATUS" == "cancelled" ]]; then
            echo "reason=TIMEOUT - No approval within 3 minutes" >> $GITHUB_OUTPUT
            echo "subject=⏰ DEPLOYMENT TIMEOUT" >> $GITHUB_OUTPUT
          else
            echo "reason=FAILED/REJECTED" >> $GITHUB_OUTPUT
            echo "subject=❌ DEPLOYMENT FAILED" >> $GITHUB_OUTPUT
          fi
      - name: Send Final Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER_ADDRESS }}
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: Sai.Karthik@ust.com
          subject: "${{ steps.failure_reason.outputs.subject }}"
          body: |
            Workflow Result: ${{ steps.failure_reason.outputs.reason }}
            View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
